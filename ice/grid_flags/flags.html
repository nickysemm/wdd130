<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Flags</title>

    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: gray;
        }

        header {
            background-color: #222;
            color: #fff;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
        }

        header h1 {
            margin: 0;
            font-weight: 400;
        }

        main {
            display: grid;
            grid-template-columns: 120px 320px;
            gap: 15px 25px;
            margin: 30px;
            align-items: start;
        }

        h2 {
            margin: 0;
            color: black;
        }

        hr {
            grid-column: 1 / 3;
            width: 100%;
            border: 1px solid #555;
        }

        .flag {
            width: 300px;
            height: 200px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.25);
        }

        /* Chile */
        #chile {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        #blue {
            background: blue;
            grid-column: 1 / 2;
            display: grid;
            align-items: center;
            justify-items: center;
        }

        #white {
            background: white;
            grid-column: 2 / 4;
        }

        #red {
            background: red;
            grid-column: 1 / 4;
        }

        .star {
            width: 70px;
            aspect-ratio: 1;
            background: white;
            clip-path: polygon(50% 0, 79% 90%, 2% 35%, 98% 35%, 21% 90%);
        }

        /* Denmark */
        #denmark {
            display: grid;
            grid-template-columns: 80px 25px 195px;
            grid-template-rows: 85px 25px 90px;
            background: white;
        }

        #dred1,
        #dred2,
        #dred3,
        #dred4 {
            background: red;
        }

        #dred1 {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }

        #dred2 {
            grid-column: 3 / 4;
            grid-row: 1 / 2;
        }

        #dred3 {
            grid-column: 1 / 2;
            grid-row: 3 / 4;
        }

        #dred4 {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
        }

        /* Finland */
        #finland {
            display: grid;
            grid-template-columns: 85px 35px 180px;
            grid-template-rows: 75px 35px 90px;
            background: blue;
        }

        #fwhite1,
        #fwhite2,
        #fwhite3,
        #fwhite4 {
            background: white;
        }

        #fwhite1 {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }

        #fwhite2 {
            grid-column: 3 / 4;
            grid-row: 1 / 2;
        }

        #fwhite3 {
            grid-column: 1 / 2;
            grid-row: 3 / 4;
        }

        #fwhite4 {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
        }

        /* Benin */
        #benin {
            display: grid;
            grid-template-columns: 120px 180px;
            grid-template-rows: 100px 100px;
        }

        #bgreen {
            background: green;
            grid-column: 1 / 2;
            grid-row: 1 / 3;
        }

        #byellow {
            background: yellow;
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        #bred {
            background: red;
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }

        /* Italy bonus */
        #italy {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }

        #igreen {
            background: #009246;
        }

        #iwhite {
            background: white;
        }

        #ired {
            background: #ce2b37;
        }

        /* Central African Republic super bonus */
        #car {
            display: grid;
            grid-template-columns: 1fr 40px 1fr;
            grid-template-rows: 50px 50px 50px 50px;
            position: relative;
            background: #003082;
        }

        #carblue {
            background: #003082;
            grid-column: 1 / 4;
            grid-row: 1 / 2;
        }

        #carwhite {
            background: white;
            grid-column: 1 / 4;
            grid-row: 2 / 3;
        }

        #cargreen {
            background: #289728;
            grid-column: 1 / 4;
            grid-row: 3 / 4;
        }

        #caryellow {
            background: #ffce00;
            grid-column: 1 / 4;
            grid-row: 4 / 5;
        }

        #carred {
            background: #d21034;
            grid-column: 2 / 3;
            grid-row: 1 / 5;
            z-index: 2;
        }

        #carstar {
            position: absolute;
            top: 8px;
            left: 35px;
            width: 45px;
            aspect-ratio: 1;
            background: #ffce00;
            clip-path: polygon(50% 0, 79% 90%, 2% 35%, 98% 35%, 21% 90%);
            z-index: 3;
        }
    </style>
</head>

<body>
    <header>
        <h1>Using CSS Grid to make Country Flags</h1>
    </header>

    <main>
        <h2>Chile</h2>
        <div id="chile" class="flag">
            <div id="blue">
                <div class="star"></div>
            </div>
            <div id="white"></div>
            <div id="red"></div>
        </div>

        <hr>

        <h2>Denmark</h2>
        <div id="denmark" class="flag">
            <div id="dred1"></div>
            <div id="dred2"></div>
            <div id="dred3"></div>
            <div id="dred4"></div>
        </div>

        <hr>

        <h2>Finland</h2>
        <div id="finland" class="flag">
            <div id="fwhite1"></div>
            <div id="fwhite2"></div>
            <div id="fwhite3"></div>
            <div id="fwhite4"></div>
        </div>

        <hr>

        <h2>Benin</h2>
        <div id="benin" class="flag">
            <div id="bgreen"></div>
            <div id="byellow"></div>
            <div id="bred"></div>
        </div>

        <hr>

        <h2>Italy</h2>
        <div id="italy" class="flag">
            <div id="igreen"></div>
            <div id="iwhite"></div>
            <div id="ired"></div>
        </div>

        <hr>

        <h2>C.A.R.</h2>
        <div id="car" class="flag">
            <div id="carblue"></div>
            <div id="carwhite"></div>
            <div id="cargreen"></div>
            <div id="caryellow"></div>
            <div id="carred"></div>
            <div id="carstar"></div>
        </div>
    </main>
</body>

</html>
